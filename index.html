<!DOCTYPE html>
<html>
<head>
    <title>PyDows 10</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff6b6b, #f7d794, #6a89cc, #78e08f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% {background-position:0% 50%;}
            50% {background-position:100% 50%;}
            100% {background-position:0% 50%;}
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 24px;
            margin: 5px;
        }

        button {
            background-color: rgba(0,0,0,0.5);
            color: white;
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover {
            background-color: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <h1>PyDows 10</h1>
    <p>version 1.0</p>
    <p>made by YuvenYT</p>

    <button onclick="window.open('https://www.youtube.com/@YuvenYTofficial', '_blank')">visit my youtube</button>
    <button onclick="window.open('https://github.com/YuvenYT10/pydows-code/blob/main/pydows%28beta%29.py', '_blank')">view code</button>
    <button onclick="copyCode()">copy code</button>

    <script>
        function copyCode() {
            fetch('https://raw.githubusercontent.com/YuvenYT10/pydows-code/main/pydows%28beta%29.py')
            .then(response => response.text())
            .then(text => {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Code copied to clipboard!');
                });
            });
        }
    </script>

</body>
</html>
